    // Adjust links based on current path to handle subdirectories like /services/

      const isSubpage = window.location.pathname.includes('/services/');
      if (isSubpage) {
        document.querySelectorAll('.mobile-links a, .mobile-menu-footer a').forEach(a => {
          const href = a.getAttribute('href');
